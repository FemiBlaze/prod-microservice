name: Deploy to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::251894223238:role/github-actions-ecs-role
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin $(aws sts get-caller-identity --query Account --output text).dkr.ecr.us-east-1.amazonaws.com

      - name: Build Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t prod-microservice:$IMAGE_TAG ./microservice
          docker tag prod-microservice:$IMAGE_TAG $(aws sts get-caller-identity --query Account --output text).dkr.ecr.us-east-1.amazonaws.com/prod-microservice:$IMAGE_TAG
          docker push $(aws sts get-caller-identity --query Account --output text).dkr.ecr.us-east-1.amazonaws.com/prod-microservice:$IMAGE_TAG

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster prod-microservice-cluster \
            --service prod-microservice-service \
            --force-new-deployment

